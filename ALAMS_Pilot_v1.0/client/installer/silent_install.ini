; =============================================================================
; ALAMS Workstation Client - Silent Installation Configuration
; =============================================================================
; Save this file alongside the ALAMS MSI installer package to automate deployment.
; Run with: msiexec /i AlamsClient.msi /qn /norestart LIMITUI=1
; =============================================================================

[SetupValues]
; Base HTTP/HTTPS address of the Central Server
SERVER_URL="http://localhost:5000"

; The name of the Lab where the workstation is located
LAB_NAME="SUAS Lab A"

; Automatically run shell enrollment for target student accounts (1 = yes, 0 = no)
AUTO_ENROLL=1

; Restrict only this Windows user account shell (if empty, runs on current user)
TARGET_STUDENT_USER="Student"

; Delete existing configuration files if reinstalling (1 = yes, 0 = no)
FORCE_CLEAN_INSTALL=0

; Auto-start the Watchdog Service after setup completes (1 = yes, 0 = no)
START_SERVICES=1
